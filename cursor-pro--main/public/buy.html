<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Buy License</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 40px auto; padding: 20px; }
        input, select, button { width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; }
        button { background: #27ae60; color: white; border: none; cursor: pointer; font-size: 1.1em; }
    </style>
</head>
<body>
    <h2>Purchase License</h2>
    <form id="buy-form">
        <label>Email:</label>
        <input type="email" id="email" required placeholder="your@email.com">
        
        <label>Plan:</label>
        <select id="plan">
            <option value="day">Day Pass ($3)</option>
            <option value="week">Weekly Pass ($20)</option>
            <option value="month">Monthly Pass ($70)</option>
            <option value="year">Yearly Pass ($700)</option>
        </select>
        
        <label>Payment Method:</label>
        <select id="payment_method">
            <option value="crypto">Crypto (USDT/BTC/ETH)</option>
            <option value="fiat">Credit Card / Fiat (PayGate)</option>
        </select>
        
        <button type="submit">Proceed to Payment</button>
    </form>

    <script>
        // 配置后端地址（注意：末尾不要带斜杠）
        window.BACKEND_BASE_URL = 'https://cursor-ey751umd1-xcc148473-dots-projects.vercel.app';

        const BACKEND_BASE_URL = (window.BACKEND_BASE_URL || '').trim();
        function api(path) {
            if (!BACKEND_BASE_URL) return path;
            return BACKEND_BASE_URL.replace(/\/+$/, '') + path;
        }

        document.getElementById('buy-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const plan = document.getElementById('plan').value;
            const payment_method = document.getElementById('payment_method').value;
            const btn = e.target.querySelector('button');
            
            btn.disabled = true;
            btn.textContent = 'Creating Invoice...';

            try {
                const res = await fetch(api('/api/checkout'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, plan, payment_method })
                });
                const data = await res.json();
                
                if (data.payment_url) {
                    window.location.href = data.payment_url;
                } else {
                    alert('Error: ' + (data.message || 'Unknown error'));
                    btn.disabled = false;
                    btn.textContent = 'Pay with Crypto';
                }
            } catch (err) {
                alert('Network error');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
