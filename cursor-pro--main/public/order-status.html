<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Status</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; text-align: center; }
        .hidden { display: none; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .key-box { background: #f0f0f0; padding: 15px; border-radius: 5px; font-family: monospace; font-size: 1.2em; margin: 20px 0; word-break: break-all; }
        .btn { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 1em; }
        .btn:hover { background: #2980b9; }
        .status-text { font-size: 1.2em; color: #555; }
        .success-text { color: #2ecc71; font-weight: bold; font-size: 1.5em; }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p class="status-text" id="status-msg">Waiting for payment...</p>
    </div>

    <div id="result" class="hidden">
        <p class="success-text">Payment Successful!</p>
        <p>Your License Key:</p>
        <div class="key-box" id="license-key"></div>
        <button class="btn" onclick="copyKey()">Copy Key</button>
        <p style="color: #e74c3c; margin-top: 20px;">Save this key now! It will expire in 24h.</p>
    </div>

    <script>
        // 配置后端地址（注意：末尾不要带斜杠）
        window.BACKEND_BASE_URL = 'https://cursor-ey751umd1-xcc148473-dots-projects.vercel.app';

        const BACKEND_BASE_URL = (window.BACKEND_BASE_URL || '').trim();
        function api(path) {
            if (!BACKEND_BASE_URL) return path;
            return BACKEND_BASE_URL.replace(/\/+$/, '') + path;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id');
        const email = urlParams.get('email'); // Get email for verification
        const statusMsg = document.getElementById('status-msg');
        const loadingDiv = document.getElementById('loading');
        const resultDiv = document.getElementById('result');
        const licenseKeyDiv = document.getElementById('license-key');

        if (!orderId) {
            statusMsg.textContent = 'Error: No Order ID provided.';
        } else if (!email) {
            statusMsg.textContent = 'Error: No Email provided. Security check failed.';
        } else {
            const pollInterval = setInterval(checkStatus, 3000);
            checkStatus();

            async function checkStatus() {
                try {
                    const res = await fetch(api(`/api/check-order-status?order_id=${encodeURIComponent(orderId)}&email=${encodeURIComponent(email)}`));
                    const data = await res.json();

                    if (data.status === 'completed') {
                        clearInterval(pollInterval);
                        showResult(data.key);
                    } else if (data.status === 'processing') {
                        statusMsg.textContent = 'Payment confirmed. Generating license key...';
                    } else {
                        statusMsg.textContent = 'Waiting for payment...';
                    }
                } catch (e) {
                    console.error('Polling error:', e);
                }
            }
        }

        function showResult(key) {
            loadingDiv.classList.add('hidden');
            resultDiv.classList.remove('hidden');
            licenseKeyDiv.textContent = key;
        }

        function copyKey() {
            const key = licenseKeyDiv.textContent;
            navigator.clipboard.writeText(key).then(() => {
                alert('Copied to clipboard!');
            });
        }
    </script>
</body>
</html>
